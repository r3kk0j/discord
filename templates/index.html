<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Czat</title>
    <style>
        body { font-family: sans-serif; background: #36393f; color: white; text-align: center; padding-top: 50px; }
        .card { background: #2f3136; padding: 20px; display: inline-block; border-radius: 8px; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #5865f2; color: white; border: none; cursor: pointer; }
        a { color: #00aff4; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        {% if type == 'login' %}
            <h2>Login</h2>
            <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Zaloguj</button></form>
            <p><a href="{% url 'register' %}">Rejestracja</a></p>
        {% elif type == 'register' %}
            <h2>Rejestracja</h2>
            <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Zarejestruj</button></form>
            <p><a href="{% url 'login' %}">Masz konto?</a></p>
        {% else %}
            <h2>Witaj {{ user.username }}</h2>
            {% for c in channels %}<p><a href="{% url 'chat_room' c.name %}"># {{ c.name }}</a></p>{% endfor %}
            <a href="{% url 'logout' %}" style="color:red">Wyloguj</a>
        {% endif %}
    </div>
</body>
</html>
