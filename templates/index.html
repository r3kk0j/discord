<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Strona Główna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --discord-dark: #313338;
            --discord-sidebar: #2B2D31;
            --discord-accent: #5865F2;
        }
        body {
            background-color: var(--discord-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .welcome-card {
            background-color: var(--discord-sidebar);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .btn-discord {
            background-color: var(--discord-accent);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-discord:hover {
            background-color: #4752C4;
            color: white;
        }
        .channel-link {
            text-decoration: none;
            color: #b5bac1;
            display: block;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            background: #232428;
        }
        .channel-link:hover {
            background: #35373c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <h2 class="mb-4">Witaj w Discordzie</h2>
        <p class="text-secondary mb-4">Wybierz kanał tekstowy, aby dołączyć do rozmowy:</p>

        <a href="/chat/ogolny/" class="channel-link"># ogólny</a>
        <a href="/chat/projekt-django/" class="channel-link"># projekt-django</a>
        <a href="/chat/multimedia/" class="channel-link"># multimedia</a>

        <div class="mt-4 pt-3 border-top border-secondary">
            <small class="text-secondary">Zalogowany jako: <strong>{{ user.username|default:"Anonim" }}</strong></small>
        </div>
    </div>
</body>
</html>
