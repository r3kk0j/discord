<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Discord - {{ room_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #313338; color: #dbdee1; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg-box { margin-bottom: 15px; }
        .msg-user { color: #fff; font-weight: bold; font-size: 0.9rem; }
        .input-area { padding: 20px; background: #313338; }
        .discord-input { background: #383a40; border: none; color: #dbdee1; border-radius: 8px; padding: 12px; width: 100%; }
        .channel-link { color: #949ba4; text-decoration: none; padding: 8px; display: block; border-radius: 4px; }
        .channel-link:hover, .channel-link.active { background: #3f4147; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar p-3">
        <h6 class="text-uppercase small fw-bold mb-3">Kanały tekstowe</h6>
        {% for ch in channels %}
            <a href="{% url 'chat_room' ch.name %}" class="channel-link {% if ch.name == room_name %}active{% endif %}"># {{ ch.name }}</a>
        {% endfor %}
    </div>

    <div class="chat-main">
        <div class="messages" id="chat-log">
            {% for m in chat_messages %}
                <div class="msg-box">
                    <div class="msg-user">{{ m.sender.username }} <small class="text-muted ms-2">{{ m.timestamp|date:"H:i" }}</small></div>
                    <div>{{ m.content }}</div>
                </div>
            {% endfor %}
        </div>
        <div class="input-area">
            <input id="chat-message-input" type="text" class="discord-input" placeholder="Napisz na #{{ room_name }}">
        </div>
    </div>

    <script>
        const roomName = "{{ room_name }}";
        const chatSocket = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/chat/' + roomName + '/');

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            document.querySelector('#chat-log').innerHTML += `
                <div class="msg-box">
                    <div class="msg-user">${data.sender}</div>
                    <div>${data.message}</div>
                </div>`;
            document.querySelector('#chat-log').scrollTop = document.querySelector('#chat-log').scrollHeight;
        };

        document.querySelector('#chat-message-input').onkeyup = function(e) {
            if (e.keyCode === 13) {
                chatSocket.send(JSON.stringify({'message': e.target.value}));
                e.target.value = '';
            }
        };
    </script>
</body>
</html>
